<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Сёрфер волн</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#ffffff;
    --ink:#2b3a3a;
    --muted:#9fb0b0;
    --faint:#c9d6d6;
    --teal:#3aa99a;
    --teal-soft:#e6f4f1;
    --ring:#d8ece7;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px);
    overflow:hidden;
    user-select:none;
  }
  .serif{font-family:Georgia,"Times New Roman",serif;font-style:italic}
  .eyebrow{
    letter-spacing:.42em;font-size:12px;color:var(--faint);
    text-transform:uppercase;margin-bottom:22px;font-weight:600;
  }
  .count{
    font-family:Georgia,serif;font-size:88px;line-height:1;color:var(--ink);
    font-weight:400;transition:transform .25s ease;
  }
  .count.pulse{transform:scale(1.12)}
  .count-label{
    font-family:Georgia,serif;font-style:italic;color:var(--muted);
    font-size:19px;margin-top:8px;margin-bottom:26px;
  }
  .wave-btn{
    position:relative;width:300px;max-width:78vw;aspect-ratio:1;border-radius:50%;
    border:none;background:#fff;color:var(--teal);cursor:pointer;
    font-family:Georgia,serif;font-style:italic;font-size:26px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 1px var(--ring), 0 24px 70px -20px rgba(58,169,154,.35);
    transition:transform .12s ease, box-shadow .3s ease;
  }
  .wave-btn:active{transform:scale(.96)}
  .ripple{
    position:absolute;inset:0;border-radius:50%;border:2px solid var(--teal);
    opacity:0;pointer-events:none;
  }
  .ripple.go{animation:ripple 1.1s ease-out}
  @keyframes ripple{
    0%{opacity:.5;transform:scale(1)}
    100%{opacity:0;transform:scale(1.6)}
  }
  .hint{color:var(--muted);font-size:14px;margin-top:28px;text-align:center;max-width:320px}
  .journal-btn{
    margin-top:22px;width:300px;max-width:78vw;padding:18px;border-radius:16px;
    background:#fff;border:1.5px solid var(--ring);color:var(--teal);
    font-size:17px;cursor:pointer;transition:background .2s;
  }
  .journal-btn:active{background:var(--teal-soft)}
  .quote{
    margin-top:34px;font-family:Georgia,serif;font-style:italic;
    color:var(--faint);font-size:16px;text-align:center;max-width:340px;line-height:1.5;
  }
  /* Журнал */
  .sheet{
    position:fixed;inset:0;background:#fff;transform:translateY(100%);
    transition:transform .32s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 20px) 22px calc(env(safe-area-inset-bottom) + 20px);
    z-index:10;
  }
  .sheet.open{transform:translateY(0)}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .sheet-head h2{font-family:Georgia,serif;font-weight:400;font-size:24px}
  .close{border:none;background:none;font-size:26px;color:var(--muted);cursor:pointer;line-height:1}
  .stats{display:flex;gap:12px;margin:16px 0 20px}
  .stat{flex:1;background:var(--teal-soft);border-radius:14px;padding:14px;text-align:center}
  .stat b{display:block;font-family:Georgia,serif;font-size:28px;color:var(--teal);font-weight:400}
  .stat span{font-size:12px;color:var(--muted)}
  .log{flex:1;overflow-y:auto}
  .log-item{
    display:flex;align-items:center;gap:12px;padding:14px 4px;
    border-bottom:1px solid #f0f4f4;
  }
  .dot{width:10px;height:10px;border-radius:50%;background:var(--teal);flex:none}
  .log-item .t{font-size:15px;color:var(--ink)}
  .log-item .d{font-size:12px;color:var(--muted);margin-left:auto}
  .empty{color:var(--muted);text-align:center;margin-top:60px;font-style:italic;font-family:Georgia,serif}
</style>
</head>
<body>
  <div class="eyebrow">Сёрфер&nbsp;&nbsp;волн</div>
  <div class="count" id="count">0</div>
  <div class="count-label">волн рассмотрено</div>

  <button class="wave-btn" id="waveBtn">
    <span class="ripple" id="ripple"></span>
    <span>волна&nbsp;пришла</span>
  </button>

  <div class="hint">Счётчик считает не воздержание, а взгляды.</div>
  <button class="journal-btn" id="openJournal">Журнал</button>
  <div class="quote">«То, что наблюдает тягу, никогда не курило.»</div>

  <!-- Журнал -->
  <div class="sheet" id="sheet">
    <div class="sheet-head">
      <h2>Журнал</h2>
      <button class="close" id="closeJournal">✕</button>
    </div>
    <div class="stats">
      <div class="stat"><b id="stToday">0</b><span>сегодня</span></div>
      <div class="stat"><b id="stTotal">0</b><span>всего</span></div>
      <div class="stat"><b id="stStreak">0</b><span>дней подряд</span></div>
    </div>
    <div class="log" id="log"></div>
  </div>

<script>
const tg = window.Telegram?.WebApp;
try{ tg?.ready(); tg?.expand(); tg?.setHeaderColor?.('#ffffff'); tg?.setBackgroundColor?.('#ffffff'); }catch(e){}

const KEY='serfer_waves';
let waves=[]; // массив timestamp (ms)

function haptic(){ try{ tg?.HapticFeedback?.impactOccurred('medium'); }catch(e){} }

// ---- хранилище: CloudStorage (синк между устройствами) с фолбэком на localStorage ----
function load(cb){
  if(tg?.CloudStorage){
    tg.CloudStorage.getItem(KEY,(err,val)=>{
      if(!err && val){ try{ waves=JSON.parse(val)||[] }catch(e){} }
      else { try{ waves=JSON.parse(localStorage.getItem(KEY))||[] }catch(e){} }
      cb();
    });
  } else {
    try{ waves=JSON.parse(localStorage.getItem(KEY))||[] }catch(e){}
    cb();
  }
}
function save(){
  const s=JSON.stringify(waves);
  try{ localStorage.setItem(KEY,s) }catch(e){}
  try{ tg?.CloudStorage?.setItem(KEY,s) }catch(e){}
}

const $=id=>document.getElementById(id);
const isSameDay=(a,b)=>{const x=new Date(a),y=new Date(b);return x.getFullYear()===y.getFullYear()&&x.getMonth()===y.getMonth()&&x.getDate()===y.getDate();};

function render(){
  $('count').textContent=waves.length;
  // статистика
  const now=Date.now();
  $('stTotal').textContent=waves.length;
  $('stToday').textContent=waves.filter(t=>isSameDay(t,now)).length;
  $('stStreak').textContent=streak();
  // журнал
  const log=$('log');
  if(!waves.length){ log.innerHTML='<div class="empty">Пока ни одной волны.<br>Заметил тягу — нажми кнопку.</div>'; return; }
  const days={};
  [...waves].reverse().forEach(t=>{
    const d=new Date(t);
    const key=d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
    (days[key]=days[key]||[]).push(t);
  });
  log.innerHTML=Object.entries(days).map(([day,arr])=>
    arr.map(t=>{
      const time=new Date(t).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
      return `<div class="log-item"><span class="dot"></span><span class="t">Волна рассмотрена</span><span class="d">${day}, ${time}</span></div>`;
    }).join('')
  ).join('');
}

function streak(){
  if(!waves.length) return 0;
  const dayset=new Set(waves.map(t=>{const d=new Date(t);return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}));
  let s=0; let cur=new Date();
  for(;;){
    const k=cur.getFullYear()+'-'+cur.getMonth()+'-'+cur.getDate();
    if(dayset.has(k)){ s++; cur.setDate(cur.getDate()-1); }
    else break;
  }
  return s;
}

$('waveBtn').addEventListener('click',()=>{
  waves.push(Date.now());
  save();
  haptic();
  const c=$('count'); c.classList.remove('pulse'); void c.offsetWidth; c.classList.add('pulse');
  const r=$('ripple'); r.classList.remove('go'); void r.offsetWidth; r.classList.add('go');
  render();
});

$('openJournal').addEventListener('click',()=>{ render(); $('sheet').classList.add('open'); });
$('closeJournal').addEventListener('click',()=>$('sheet').classList.remove('open'));

load(render);
</script>
</body>
</html>
